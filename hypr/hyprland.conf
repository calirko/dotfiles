# Programs
$terminal    = kitty
$fileManager = nautilus
$menu        = wofi --style ~/.config/wofi/style.css --allow-images --show drun

# Autostart
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name "JetBrainsMono Nerd Font Mono 11"
exec-once = gsettings set org.gnome.desktop.interface font-name "JetBrainsMono Nerd Font 11"
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = systemctl --user start hyprpolkitagent
exec-once = /home/calirko/.config/hypr/scripts/wallpaper-default.sh
exec-once = eww daemon
exec-once = /home/calirko/.config/hypr/scripts/bar.sh
exec-once = hypridle
exec-once = easyeffects --gapplication-service
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = bash -lc 'sleep 5; ~/.config/eww/scripts/vpn-menu.sh connect peer_dragon'
exec-once = discord --start-minimized

# Environment
env = GNOME_KEYRING_CONTROL, /run/user/1000/keyring
env = XCURSOR_SIZE,          24
env = HYPRCURSOR_SIZE,       24
env = GDK_BACKEND,           wayland
env = ADW_DISABLE_PORTAL,    1
env = XDG_CURRENT_DESKTOP,   Hyprland
env = HYPRSHOT_DIR,          /home/calirko/Pictures/Screenshots
env = GTK_FONT_NAME,         JetBrainsMono Nerd Font 11
env = GTK_THEME,             adw-gtk3-dark

# General
general {
    gaps_in        = 4
    gaps_out       = 8
    border_size    = 0
    resize_on_border    = false
    allow_tearing       = false
    layout              = dwindle
}

# Decoration
decoration {
    shadow {
        enabled = false
    }
    blur   {
        enabled = false
    }
    dim_inactive = true
    dim_strength = 0.1
}

# Animations
animations {
    enabled = yes

    bezier = snappy,  0.18, 1,    0.18, 1
    bezier = instant, 0.1,  0.9,  0.1,  1
    bezier = slide,   0.25, 1,    0.25, 1

    animation = global,        1, 1,   default
    animation = windows,       1, 2.2, snappy
    animation = windowsIn,     1, 2.2, snappy,  slide
    animation = windowsOut,    1, 1.5, instant, slide
    animation = border,        1, 2,   instant
    animation = fadeIn,        1, 2,   instant
    animation = fadeOut,       1, 1.5, instant
    animation = fade,          1, 2,   instant
    animation = layers,        1, 2,   snappy
    animation = layersIn,      1, 2,   snappy,  slide
    animation = layersOut,     1, 1.5, instant, slide
    animation = fadeLayersIn,  1, 1.5, instant
    animation = fadeLayersOut, 1, 1.2, instant
    animation = workspaces,    1, 2.5, slide,   slide
    animation = workspacesIn,  1, 2.5, slide,   slide
    animation = workspacesOut, 1, 2,   instant, slide
    animation = zoomFactor,    1, 3,   snappy
}

# Layout
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

# Misc
misc {
    vfr                    = true
    font_family            = JetBrainsMono Nerd Font
    force_default_wallpaper = 0
    disable_hyprland_logo  = true
}

# Input
input {
    kb_layout    = br
    follow_mouse = 1
    accel_profile = flat
    sensitivity  = 0
}

# Keybinds
$mainMod = SUPER

bind  = , Print,              exec, hyprshot -m region
bind  = $mainMod, Q,          exec, $terminal
bind  = $mainMod, L,          exec, pidof hyprlock >/dev/null || hyprlock
bind  = $mainMod, C,          killactive
bind  = $mainMod, M,          exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind  = $mainMod, E,          exec, $fileManager
bind  = $mainMod, V,          togglefloating
bind = $mainMod, R, exec, pgrep -x wofi > /dev/null || $menu
bind  = $mainMod, P,          pseudo
bind  = $mainMod, J,          togglesplit
bind  = $mainMod, S,          togglespecialworkspace, magic
bind  = $mainMod, space,      exec, ~/.config/eww/scripts/kb-layout-toggle.sh
bind  = $mainMod, Z,          exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind  = $mainMod SHIFT, W,    exec, ~/.config/hypr/scripts/wallpaper-select.sh
bind  = $mainMod SHIFT, S,    movetoworkspace, special:magic
bind  = $mainMod SHIFT, P,    exec, hyprpicker -a
bind  = $mainMod SHIFT, T,    exec, ~/.config/eww/scripts/toggle-sensors.sh

bind  = $mainMod, left,       movefocus, l
bind  = $mainMod, right,      movefocus, r
bind  = $mainMod, up,         movefocus, u
bind  = $mainMod, down,       movefocus, d

bind  = $mainMod, 1,          workspace, 1
bind  = $mainMod, 2,          workspace, 2
bind  = $mainMod, 3,          workspace, 3
bind  = $mainMod, 4,          workspace, 4
bind  = $mainMod, 5,          workspace, 5
bind  = $mainMod, 6,          workspace, 6
bind  = $mainMod, 7,          workspace, 7
bind  = $mainMod, 8,          workspace, 8
bind  = $mainMod, 9,          workspace, 9
bind  = $mainMod, 0,          workspace, 10

bind  = $mainMod SHIFT, 1,    movetoworkspace, 1
bind  = $mainMod SHIFT, 2,    movetoworkspace, 2
bind  = $mainMod SHIFT, 3,    movetoworkspace, 3
bind  = $mainMod SHIFT, 4,    movetoworkspace, 4
bind  = $mainMod SHIFT, 5,    movetoworkspace, 5
bind  = $mainMod SHIFT, 6,    movetoworkspace, 6
bind  = $mainMod SHIFT, 7,    movetoworkspace, 7
bind  = $mainMod SHIFT, 8,    movetoworkspace, 8
bind  = $mainMod SHIFT, 9,    movetoworkspace, 9
bind  = $mainMod SHIFT, 0,    movetoworkspace, 10

bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume-notify.sh up
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume-notify.sh down
bindel = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume-notify.sh mute
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness-notify.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-notify.sh down

bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPrev,  exec, playerctl previous

# Window Rules
windowrule {
  name = discord-float-center
  match:class = discord
  float = on
  center = on
}

#nautilus
windowrule {
  name = nautilus-float
  match:class = org.gnome.Nautilus
  float = on
}

# org.prismlauncher.PrismLauncher
windowrule {
  name = prism-launcher-float
  match:class = org.prismlauncher.PrismLauncher
  float = on
}

# blueman
windowrule {
  name = blueman-float
  match:class = blueman-manager
  float = on
}

# xdg-desktop-portal-gtk
windowrule {
  name = xdg-desktop-portal-gtk
  match:class = xdg-desktop-portal-gtk
  float = on
}

# org.gnome.Loupe
windowrule {
  name = loupe-float
  match:class = org.gnome.Loupe
  float = on
}

# bitwarden extension
windowrule {
   name = bitwarden-extension-float
   match:title = Extension: (Bitwarden Password Manager) - Bitwarden — Zen Browser
   float = on
}

windowrule {
	name = shimeji
	match:class = com-group_finity-mascot-Main

	float = true
	no_blur = true
	no_focus = true
	no_shadow = true
	border_size = 0
}
