general {
    disable_loading_bar = true
    hide_cursor = true
}

# background {
#     monitor =
#     color = rgb(141414)
# }

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

# Time label
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgb(eaeaea)
    font_size = 72
    font_family = Inter Bold
    position = 0, 100
    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"
    color = rgb(eaeaea)
    font_size = 20
    font_family = Inter
    position = 0, 35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 54
    position = 0, -60
    halign = center
    valign = center

    rounding = 0
    dots_rounding = 0
    outline_thickness = 0
    inner_color = rgb(171717)
    outer_color = rgb(171717)
    check_color = rgb(171717)
    fail_color = rgb(171717)
    font_color = rgb(eaeaea)
    placeholder_text = Enter password
    fade_on_empty = false
}
