general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    color =
    blur_passes = 3
}

# Time label
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgb(176, 176, 176)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"
    color = rgb(176, 176, 176)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 54
    position = 0, -60
    halign = center
    valign = center

    rounding = 0
    dots_rounding = 0
    outline_thickness = 0
    inner_color = rgb(171717)
    outer_color = rgb(171717)
    check_color = rgb(171717)
    fail_color = rgb(171717)
    font_color = rgb(176, 176, 176)
    placeholder_text = Enter password
    fade_on_empty = false
}

animations {
    animation = fadeIn, 2, 2, snappy
    animation = fadeOut, 2, 2, snappy
}
